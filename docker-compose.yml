services:
  buzz-dav:
    build:
      context: .
      dockerfile: buzz/Dockerfile
    container_name: buzz-dav
    restart: unless-stopped
    environment:
      - MEDIA_SERVER=${MEDIA_SERVER:-plex}
      - PLEX_URL=${PLEX_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      - LIBRARY_MOUNT=${LIBRARY_MOUNT:-/mnt/buzz}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_SCAN_TASK_ID=${JELLYFIN_SCAN_TASK_ID:-}
      - PRESENTATION_BUILDER_URL=${PRESENTATION_BUILDER_URL:-http://buzz-curator:8400/rebuild}
      - UV_CACHE_DIR=/app/cache/uv-buzz
    ports:
      - 9999:9999
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9999/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - ./scripts/media_update.sh:/app/media_update.sh
      - ./scripts/plex_update.sh:/app/plex_update.sh
      - ./scripts/jellyfin_update.sh:/app/jellyfin_update.sh
      - ./:/app
      - buzzdata:/app/data
    command: ["dav"]

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      PUID: 1000
      PGID: 1000
    volumes:
      - /mnt/buzz:/data:rshared # CHANGE /mnt/buzz WITH YOUR PREFERRED MOUNT PATH
      - ./rclone.conf:/config/rclone/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    depends_on:
      buzz-dav:
        condition: service_healthy
    command: "mount buzz: /data --allow-other --allow-non-empty --dir-cache-time 10s --vfs-cache-mode full --default-permissions --uid 1000 --gid 1000"
    healthcheck:
      test: ["CMD-SHELL", "ls /data/movies >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  plex:
    profiles: ["plex"]
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - VERSION=${PLEX_VERSION:-docker} # Plex only
      - PLEX_CLAIM=${PLEX_CLAIM:-} # Plex only
    volumes:
      - ./config/plex:/config
      - /mnt:/mnt:ro
    restart: unless-stopped

  jellyfin:
    profiles: ["jellyfin"]
    image: jellyfin/jellyfin
    container_name: jellyfin
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./config/jellyfin:/config
      - ./cache/jellyfin:/cache
      - /mnt:/mnt:ro
    devices:
      - "/dev/dri:/dev/dri"
    restart: unless-stopped

  buzz-curator:
    profiles: ["jellyfin", "plex"]
    build:
      context: .
      dockerfile: buzz/Dockerfile
    container_name: buzz-curator
    user: "${PUID:-1000}:${PGID:-1000}"
    working_dir: /app
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - PRESENTATION_BIND=0.0.0.0
      - PRESENTATION_PORT=${PRESENTATION_PORT:-8400}
      - PRESENTATION_BUILD_ON_START=${PRESENTATION_BUILD_ON_START:-true}
      - PRESENTATION_SOURCE_ROOT=${PRESENTATION_SOURCE_ROOT:-/mnt/buzz}
      - PRESENTATION_TARGET_ROOT=${PRESENTATION_TARGET_ROOT:-/mnt/jellyfin-library}
      - PRESENTATION_STATE_ROOT=${PRESENTATION_STATE_ROOT:-/state}
      - PRESENTATION_OVERRIDES=${PRESENTATION_OVERRIDES:-/config/overrides.yml}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_SCAN_TASK_ID=${JELLYFIN_SCAN_TASK_ID:-}
      - UV_CACHE_DIR=/app/cache/uv-pres
      - UV_PROJECT_ENVIRONMENT=/app/.venv-pres
    command: ["curator", "server"]
    volumes:
      - ./:/app
      - ./presentation/overrides.yml:/config/overrides.yml:ro
      - ./state/jellyfin-library:/state
      - /mnt:/mnt
    restart: unless-stopped

  plex-healthcheck:
    profiles: ["plex"]
    image: docker:dind
    container_name: plex-healthcheck
    environment:
      - TARGET_CONTAINER=plex
      - SELF_CONTAINER=plex-healthcheck
      - HEALTHCHECK_PATH=${HEALTHCHECK_PATH:-/mnt/buzz/movies}
      - HEALTHCHECK_VERBOSE=${HEALTHCHECK_VERBOSE:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./healthcheck.sh:/app/healthcheck.sh
      - /mnt:/mnt:ro
    entrypoint: []
    command: "ash /app/healthcheck.sh"
    depends_on:
      rclone:
        condition: service_healthy
      plex:
        condition: service_started
    restart: unless-stopped

  jellyfin-healthcheck:
    profiles: ["jellyfin"]
    image: docker:dind
    container_name: jellyfin-healthcheck
    environment:
      - TARGET_CONTAINER=jellyfin
      - SELF_CONTAINER=jellyfin-healthcheck
      - HEALTHCHECK_PATH=${HEALTHCHECK_PATH:-/mnt/buzz/movies}
      - HEALTHCHECK_VERBOSE=${HEALTHCHECK_VERBOSE:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./healthcheck.sh:/app/healthcheck.sh
      - /mnt:/mnt:ro
    entrypoint: []
    command: "ash /app/healthcheck.sh"
    depends_on:
      rclone:
        condition: service_healthy
      jellyfin:
        condition: service_started
    restart: unless-stopped

volumes:
  buzzdata:
