services:
  buzz-dav:
    image: registry.gitlab.com/gabriel.chamon/buzz/buzz:v1
    container_name: buzz-dav
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - MEDIA_SERVER=${MEDIA_SERVER:-jellyfin}
      - PLEX_URL=${PLEX_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      - LIBRARY_MOUNT=/mnt/buzz/raw
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_SCAN_TASK_ID=${JELLYFIN_SCAN_TASK_ID:-}
      - CURATOR_BUILDER_URL=${CURATOR_BUILDER_URL:-http://buzz-curator:8400/rebuild}
      - UV_CACHE_DIR=/app/cache/uv-buzz
    ports:
      - 9999:9999
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9999/readyz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - ./data:/app/data
      - /mnt/buzz/raw:/mnt/buzz/raw
      - ./buzz.yml:/app/buzz.yml:ro
    networks:
      default:
        aliases:
          - buzz
    command: ["dav"]

  rclone:
    image: rclone/rclone:latest@sha256:1619a625f845e169c34b952cf40c483c0392965b821c5155cde8cbfd35254a96
    container_name: rclone
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      PUID: 1000
      PGID: 1000
    volumes:
      - /mnt/buzz/raw:/data:shared
      - ./rclone.conf:/config/rclone/rclone.conf
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    depends_on:
      buzz-dav:
        condition: service_healthy
    command: "mount buzz: /data --allow-other --allow-non-empty --dir-cache-time 10s --vfs-cache-mode full --default-permissions --uid 1000 --gid 1000"
    healthcheck:
      test: ["CMD-SHELL", "ls /data/movies >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  plex:
    profiles: ["plex"]
    image: lscr.io/linuxserver/plex:latest@sha256:e5c7c283b242966416a4bed2d666acf6f3fb8f957c704be8333f8dc987364825
    container_name: plex
    network_mode: host
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - VERSION=${PLEX_VERSION:-docker} # Plex only
      - PLEX_CLAIM=${PLEX_CLAIM:-} # Plex only
    volumes:
      - ./config/plex:/config
      - /mnt/buzz/curated:/mnt/buzz/curated:ro
      - /mnt/buzz/raw:/mnt/buzz/raw:ro
      - /mnt/buzz/subs:/mnt/buzz/subs:ro
    restart: unless-stopped

  jellyfin:
    profiles: ["jellyfin"]
    image: jellyfin/jellyfin:latest@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
    container_name: jellyfin
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./config/jellyfin:/config
      - ./cache/jellyfin:/cache
      - /mnt/buzz/curated:/mnt/buzz/curated:ro
      - /mnt/buzz/raw:/mnt/buzz/raw:ro
      - /mnt/buzz/subs:/mnt/buzz/subs:ro
    devices:
      - "/dev/dri:/dev/dri"
    restart: unless-stopped

  buzz-curator:
    profiles: ["jellyfin", "plex"]
    image: registry.gitlab.com/gabriel.chamon/buzz/buzz:v1
    container_name: buzz-curator
    user: "${PUID:-1000}:${PGID:-1000}"
    working_dir: /app
    depends_on:
      rclone:
        condition: service_healthy
    environment:
      - CURATOR_BIND=0.0.0.0
      - CURATOR_PORT=${CURATOR_PORT:-8400}
      - CURATOR_BUILD_ON_START=${CURATOR_BUILD_ON_START:-true}
      - CURATOR_SOURCE_ROOT=/mnt/buzz/raw
      - CURATOR_TARGET_ROOT=/mnt/buzz/curated
      - CURATOR_STATE_DIR=/app/data
      - CURATOR_OVERRIDES=/config/overrides.yml
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_SCAN_TASK_ID=${JELLYFIN_SCAN_TASK_ID:-}
      - UV_CACHE_DIR=/app/cache/uv-pres
      - UV_PROJECT_ENVIRONMENT=/app/.venv-pres
    entrypoint: ["sh", "/app/scripts/curator-entrypoint.sh"]
    command: ["curator", "server"]
    volumes:
      - ./presentation/overrides.yml:/config/overrides.yml:ro
      - ./data:/app/data
      - ./buzz.yml:/app/buzz.yml:rp
      - /mnt/buzz/curated:/mnt/buzz/curated
      - /mnt/buzz/raw:/mnt/buzz/raw:ro
      - /mnt/buzz/subs:/mnt/buzz/subs
    restart: unless-stopped
