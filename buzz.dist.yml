# All settings in this file are also editable live from the Buzz web UI.
# You generally don't need to hand-edit this file beyond provider.token.
provider:
  token: yourtoken
poll_interval_secs: 10
server:
  bind: 0.0.0.0
  port: 9999
  # Read-ahead buffer size in bytes for streaming media (e.g., 52428800 for 50MB).
  # Set to 0 to disable. When enabled, a background thread pre-fetches data from
  # Real-Debrid into a bounded queue to smooth out network variations.
  stream_buffer_size: 0
  # Maximum number of concurrent upstream connections to Real-Debrid.
  # Caps the parallelism of media probes/streams (e.g. during a Jellyfin
  # library scan) so the upstream CDN doesn't drop connections under load.
  # Increase if scans crawl, decrease if you still see retry storms.
  upstream_concurrency: 4

# TLS is enabled by default. Relative paths resolve from the process working
# directory, which is /app in the container. Set both paths to "" to opt out.
tls:
  cert_path: data/tls/buzz.crt
  key_path: data/tls/buzz.key

state_dir: /app/data
hooks:
  on_library_change: "bash /app/scripts/media_update.sh"
  curator_url: "http://buzz-curator:8400/rebuild"
  # Wait for Real-Debrid inventory to settle before rebuilds triggered by RD changes.
  # This delay is not applied to manual RESYNC LIB actions from the UI.
  rd_update_delay_secs: 15
compat:
  enable_all_dir: true
  enable_unplayable_dir: true
directories:
  anime:
    patterns:
      - "\\b[a-fA-F0-9]{8}\\b"
  shows: {}
  movies: {}
request_timeout_secs: 30
user_agent: buzz/0.1
version_label: buzz/0.1
ui:
  # Frontend polling interval in seconds.
  # Set to 0 to disable auto-polling entirely.
  poll_interval_secs: 3

logging:
  verbose: false

media_server:
  # Which media server Buzz drives. Supported: jellyfin, plex.
  # Plex support is currently UNTESTED; use at your own risk.
  kind: jellyfin
  jellyfin:
    url: http://jellyfin:8096
    api_key: ""
    # Optional. Auto-discovered if empty.
    scan_task_id: ""
  plex:
    # Plex hook is currently untested.
    url: ""
    token: ""
  # Map debrid category directory names to Jellyfin library names.
  # Keys must match the directory names produced by the debrid layer
  # (movies, shows, anime). Values must match the Jellyfin library
  # names exactly as they appear in the Jellyfin UI.
  library_map:
    movies: Movies
    shows: TV Shows
    anime: Anime

subtitles:
  enabled: false
  fetch_on_resync: false
  opensubtitles:
    api_key: ""
    username: ""
    password: ""
  languages:
    - en
  strategy: most-downloaded
  filters:
    hearing_impaired: exclude
    exclude_ai: true
    exclude_machine: true
  search_delay_secs: 0.5
  download_delay_secs: 1.0
  # Where downloaded .srt files land inside the container.
  root: /mnt/buzz/subs
