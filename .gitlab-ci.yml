stages:
  - test
  - build
  - security
  - tag

include:
  - local: .gitlab/ci/gitleaks.gitlab-ci.yml
  - local: .gitlab/ci/test.gitlab-ci.yml
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        changes:
          - buzz/**/*
          - tests/**/*
          - pyproject.toml
          - uv.lock
          - pyrightconfig.json
          - .htmlhintrc
      - if: "$CI_COMMIT_BRANCH"
        changes:
          - buzz/**/*
          - tests/**/*
          - pyproject.toml
          - uv.lock
          - pyrightconfig.json
          - .htmlhintrc
      - when: never
  - local: .gitlab/ci/image-publish.gitlab-ci.yml
  - local: .gitlab/ci/security.gitlab-ci.yml

default:
  tags:
    - groundstation
