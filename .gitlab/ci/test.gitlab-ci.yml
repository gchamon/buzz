pytest:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.14-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH"
  script:
    - uv sync --group dev
    - uv run pytest --cov=buzz --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

htmlhint:
  stage: test
  image: node:alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH"
  script:
    - npx --yes htmlhint "buzz/pyview_templates/*.html"
  allow_failure: true
