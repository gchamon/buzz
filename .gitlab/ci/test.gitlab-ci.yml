pytest:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:9e24cef9880ce029f2a14a914dc2d03c640c2b71de5cf11167516b36980e16fd
  script:
    - uv sync --group dev
    - uv run pytest --cov=buzz --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

htmlhint:
  stage: test
  image: node:alpine@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4
  script:
    - npx --yes htmlhint "buzz/pyview_templates/*.html"
  allow_failure: true
