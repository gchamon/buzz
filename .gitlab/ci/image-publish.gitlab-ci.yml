include:
  - component: gitlab.com/gabriel.chamon/ci-components/docker-build@v1
    inputs:
      job_name: build_buzz_docker_image
      image_name: buzz
      image_path: .
      dockerfile_name: buzz/Dockerfile
      job_rules:
        - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
        - if: '$CI_COMMIT_BRANCH == "main"'
        - when: never
