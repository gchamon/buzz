<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>buzz: trashcan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐝</text></svg>">
  <style>
    :root {
      --bg: #282a36;
      --fg: #f8f8f2;
      --selection: #44475a;
      --comment: #6272a4;
      --cyan: #8be9fd;
      --green: #50fa7b;
      --orange: #ffb86c;
      --pink: #ff79c6;
      --purple: #bd93f9;
      --red: #ff5555;
      --yellow: #f1fa8c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }

    main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .prompt {
      margin-bottom: 4px;
      font-size: 1.1rem;
    }

    .prompt b {
      color: var(--purple);
      font-weight: bold;
    }

    .prompt span {
      color: var(--fg);
    }

    .nav-link {
      color: var(--comment);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: var(--cyan);
      text-shadow: 0 0 5px rgba(139, 233, 253, 0.5);
    }

    .nav-link.active {
      color: var(--green);
      text-shadow: 0 0 5px rgba(80, 250, 123, 0.5);
    }

    .nav-sep {
      color: var(--comment);
      margin: 0 4px;
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--comment);
    }

    .meta-item b {
      color: var(--orange);
      font-weight: normal;
    }

    .meta-item span {
      color: var(--cyan);
    }

    button {
      background: var(--purple);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    button:hover {
      filter: brightness(1.1);
    }

    button:disabled {
      background: var(--comment);
      cursor: not-allowed;
    }

    button.secondary {
      background: var(--comment);
      color: var(--fg);
    }

    .error {
      margin-bottom: 20px;
      color: var(--red);
      border-left: 3px solid var(--red);
      padding-left: 10px;
    }

    .label-red {
      color: var(--red);
      font-weight: bold;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      table-layout: fixed;
    }

    th {
      text-align: left;
      padding: 8px 4px;
      border-bottom: 1px solid var(--selection);
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      position: relative;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th:hover {
      color: var(--purple);
    }

    th.sort-asc::after {
      content: "▲";
      font-size: 0.6rem;
      margin-left: 2px;
    }

    th.sort-desc::after {
      content: "▼";
      font-size: 0.6rem;
      margin-left: 2px;
    }

    td {
      padding: 0;
      border-bottom: 1px solid rgba(68, 71, 90, 0.3);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      height: 35px;
    }

    .td-content {
      padding: 8px 4px;
      display: flex;
      align-items: center;
      height: 100%;
      width: 100%;
    }

    tr:hover {
      background: var(--selection);
    }

    .trunc-cell {
      position: relative;
      max-width: 1px;
    }

    .trunc-content {
      display: inline-block;
      white-space: nowrap;
    }

    .trunc-cell:hover .trunc-content {
      animation: scroll-text 4s linear infinite;
    }

    @keyframes scroll-text {
      0%, 10% { transform: translateX(0); }
      90%, 100% { transform: translateX(calc(-100% + 200px)); }
    }

    .name { color: var(--fg); }
    .comment { color: var(--comment); }
    .yellow { color: var(--yellow); }

    code {
      font-family: inherit;
    }

    .empty {
      color: var(--comment);
      text-align: center;
      padding: 40px;
    }

    /* Column widths */
    th:nth-child(1), td:nth-child(1) { width: auto; }  /* Name */
    th:nth-child(2), td:nth-child(2) { width: 100px; } /* Size */
    th:nth-child(3), td:nth-child(3) { width: 80px; }  /* Files */
    th:nth-child(4), td:nth-child(4) { width: 220px; } /* Date Removed */
    th:nth-child(5), td:nth-child(5) { width: 110px; text-align: right; } /* Act */

    /* Action UI */
    .delete-container {
      display: flex;
      width: 100%;
      min-height: 35px;
      align-items: stretch;
    }

    .confirm-opts {
      display: none;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: rgba(255, 184, 108, 0.2);
      gap: 15px;
    }

    .opt {
      cursor: pointer;
      text-align: center;
      font-weight: bold;
      color: var(--orange);
    }

    .opt-y:hover {
      color: var(--green);
      text-shadow: 0 0 5px rgba(80, 250, 123, 0.5);
    }

    .opt-n:hover {
      color: var(--red);
      text-shadow: 0 0 5px rgba(255, 85, 85, 0.5);
    }

    .btn-r,
    .btn-del,
    .btn-x {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
      cursor: pointer;
      font-weight: bold;
      padding: 0;
      color: var(--comment);
    }

    .btn-r:hover {
      color: var(--green);
      background: rgba(80, 250, 123, 0.1);
    }

    .btn-del:hover,
    .btn-x:hover {
      color: var(--red);
      background: rgba(255, 85, 85, 0.1);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--selection);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--comment);
    }
  </style>
</head>
<body>
  <main>
    <div class="prompt">
      <b>buzz:</b>
      <a href="/torrents" class="nav-link">🪎 cache</a>
      <span class="nav-sep">◈</span>
      <a href="/trashcan" class="nav-link active">🗑 trashcan</a>
    </div>

    <div class="meta-bar">
      <div class="meta-item"><b>[torrents]</b> <span>{{ torrents_count }}</span></div>
      <div class="meta-item"><b>[last_sync]</b> <span id="status-last-sync">{{ last_sync_at }}</span></div>
      <div class="meta-item"><b>[state]</b> <span id="status-sync">{{ sync_state }}</span></div>
      <div class="meta-item">
        <b id="status-ready-label">[ready]</b>
        <span id="status-ready" style="display: none;">{{ snapshot_ready }}</span>
      </div>
      <div class="meta-item">
        <button class="secondary" onclick="triggerManualRebuild()" style="font-size: 0.7rem; padding: 2px 8px;">
          RESYNC LIB
        </button>
      </div>
    </div>

    {{ error_html | safe }}

    <div class="table-wrap">
      <table id="torrent-table">
        <thead>
          <tr>
            <th onclick="sortTable(0)">Name</th>
            <th onclick="sortTable(1)">Size</th>
            <th onclick="sortTable(2)">Files</th>
            <th onclick="sortTable(3)">Date Removed</th>
            <th>Act</th>
          </tr>
        </thead>
        <tbody>
          {{ rows | safe }}
        </tbody>
      </table>
    </div>
  </main>

  <script>
    async function triggerManualRebuild() {
      const status = document.createElement('span');
      status.innerText = " Resyncing library...";
      status.style.color = "var(--orange)";
      document.querySelector('.prompt').appendChild(status);

      try {
        const res = await fetch('/api/curator/rebuild', { method: 'POST' });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        status.innerText = " Library resynced!";
        status.style.color = "var(--green)";
      } catch (err) {
        status.innerText = " Resync failed: " + err.message;
        status.style.color = "var(--red)";
      }

      setTimeout(() => status.remove(), 3000);
    }

    function toggleRestore(id, show) {
      document.getElementById('confirm-restore-' + id).style.display = show ? 'flex' : 'none';
      document.getElementById('btn-r-' + id).style.display = show ? 'none' : 'flex';
      document.getElementById('btn-del-' + id).style.display = show ? 'none' : 'flex';
    }

    function toggleDel(id, show) {
      document.getElementById('confirm-del-' + id).style.display = show ? 'flex' : 'none';
      document.getElementById('btn-r-' + id).style.display = show ? 'none' : 'flex';
      document.getElementById('btn-del-' + id).style.display = show ? 'none' : 'flex';
    }

    async function restoreTrash(hash, el) {
      if (el) {
        el.innerText = '...';
        el.style.pointerEvents = 'none';
      }

      try {
        const res = await fetch('/api/torrents/restore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hash: hash })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        await fetch('/sync', { method: 'POST' });
        location.reload();
      } catch (err) {
        if (el) {
          el.innerText = '[Y]';
          el.style.pointerEvents = 'auto';
        }
        alert("Restore failed: " + err.message);
      }
    }

    async function deleteTrash(hash, el) {
      if (el) {
        el.innerText = '...';
        el.style.pointerEvents = 'none';
      }

      try {
        const res = await fetch('/api/torrents/delete_permanently', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hash: hash })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        location.reload();
      } catch (err) {
        if (el) {
          el.innerText = '[Y]';
          el.style.pointerEvents = 'auto';
        }
        alert("Delete failed: " + err.message);
      }
    }

    async function pollStatus() {
      try {
        const res = await fetch('/healthz');
        if (!res.ok) throw new Error('Offline');
        const data = await res.json();

        document.getElementById('status-sync').innerText = data.sync_in_progress ? 'syncing' : 'idle';
        document.getElementById('status-last-sync').innerText = data.last_sync_at || 'never';

        const readyLabel = document.getElementById('status-ready-label');
        if (data.snapshot_loaded) {
          readyLabel.innerText = '[ready]';
          readyLabel.style.color = 'var(--green)';
        } else {
          readyLabel.innerText = '[starting]';
          readyLabel.style.color = 'var(--orange)';
        }
      } catch (err) {
        document.getElementById('status-sync').innerText = 'unknown';
        const readyLabel = document.getElementById('status-ready-label');
        readyLabel.innerText = '[offline]';
        readyLabel.style.color = 'var(--cyan)';
      }
    }

    const initReady = document.getElementById('status-ready').innerText === 'true';
    const readyLabel = document.getElementById('status-ready-label');
    if (initReady) {
      readyLabel.innerText = '[ready]';
      readyLabel.style.color = 'var(--green)';
    } else {
      readyLabel.innerText = '[starting]';
      readyLabel.style.color = 'var(--orange)';
    }

    setInterval(pollStatus, 3000);

    function sortTable(n) {
      const table = document.getElementById("torrent-table");
      let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
      switching = true;
      dir = "asc";

      const headers = table.getElementsByTagName("th");
      for (let h = 0; h < headers.length; h++) {
        if (h === n) {
          if (headers[h].classList.contains("sort-asc")) {
            headers[h].classList.replace("sort-asc", "sort-desc");
            dir = "desc";
          } else if (headers[h].classList.contains("sort-desc")) {
            headers[h].classList.replace("sort-desc", "sort-asc");
            dir = "asc";
          } else {
            headers[h].classList.add("sort-asc");
            dir = "asc";
          }
        } else {
          headers[h].classList.remove("sort-asc", "sort-desc");
        }
      }

      while (switching) {
        switching = false;
        rows = table.rows;

        for (i = 1; i < (rows.length - 1); i++) {
          shouldSwitch = false;
          x = rows[i].getElementsByTagName("TD")[n];
          y = rows[i + 1].getElementsByTagName("TD")[n];

          let valX = x.getAttribute("data-value") || x.innerText.toLowerCase();
          let valY = y.getAttribute("data-value") || y.innerText.toLowerCase();

          const numX = parseFloat(valX);
          const numY = parseFloat(valY);
          if (!isNaN(numX) && !isNaN(numY)) {
            valX = numX;
            valY = numY;
          }

          if (dir === "asc") {
            if (valX > valY) {
              shouldSwitch = true;
              break;
            }
          } else if (dir === "desc") {
            if (valX < valY) {
              shouldSwitch = true;
              break;
            }
          }
        }

        if (shouldSwitch) {
          rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
          switching = true;
          switchcount++;
        } else {
          if (switchcount === 0 && dir === "asc") {
            dir = "desc";
            switching = true;
          }
        }
      }
    }
  </script>
</body>
</html>
