<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>buzz: list torrents</title>
  <style>
    :root {
      --bg: #282a36;
      --fg: #f8f8f2;
      --selection: #44475a;
      --comment: #6272a4;
      --cyan: #8be9fd;
      --green: #50fa7b;
      --orange: #ffb86c;
      --pink: #ff79c6;
      --purple: #bd93f9;
      --red: #ff5555;
      --yellow: #f1fa8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .prompt { margin-bottom: 4px; font-size: 1.1rem; }
    .prompt b { color: var(--purple); font-weight: bold; }
    .prompt span { color: var(--fg); }
    
    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--comment);
    }
    .meta-item b { color: var(--orange); font-weight: normal; }
    .meta-item span { color: var(--cyan); }

    .error {
      margin-bottom: 20px;
      color: var(--red);
      border-left: 3px solid var(--red);
      padding-left: 10px;
    }
    .label-red { color: var(--red); font-weight: bold; }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid var(--selection);
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th:hover { color: var(--purple); }
    th.sort-asc::after { content: " ▲"; position: absolute; right: 0; }
    th.sort-desc::after { content: " ▼"; position: absolute; right: 0; }

    td {
      padding: 8px;
      border-bottom: 1px solid rgba(68, 71, 90, 0.3);
      vertical-align: top;
    }
    tr:hover { background: var(--selection); }
    
    .name { color: var(--fg); }
    .status { font-weight: bold; }
    .status-downloaded { color: var(--green); }
    .status-error { color: var(--red); }
    .status-uploading { color: var(--cyan); }
    .status-downloading { color: var(--orange); }
    
    .comment { color: var(--comment); }
    .yellow { color: var(--yellow); }
    
    code { font-family: inherit; }
    .empty { color: var(--comment); text-align: center; padding: 40px; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--selection); }
    ::-webkit-scrollbar-thumb:hover { background: var(--comment); }
  </style>
</head>
<body>
  <main>
    <div class="prompt"><b>buzz:</b> <span>list torrents</span></div>
    <div class="meta-bar">
      <div class="meta-item"><b>[torrents]</b> <span>{torrents_count}</span></div>
      <div class="meta-item"><b>[last_sync]</b> <span>{last_sync_at}</span></div>
      <div class="meta-item"><b>[state]</b> <span>{sync_state}</span></div>
      <div class="meta-item"><b>[ready]</b> <span>{snapshot_ready}</span></div>
    </div>
    
    {error_html}
    
    <div class="table-wrap">
      <table id="torrent-table">
        <thead>
          <tr>
            <th onclick="sortTable(0)">Name</th>
            <th onclick="sortTable(1)">Status</th>
            <th onclick="sortTable(2)">Prog</th>
            <th onclick="sortTable(3)">Size</th>
            <th onclick="sortTable(4)">Files</th>
            <th onclick="sortTable(5)">Links</th>
            <th onclick="sortTable(6)">Ended</th>
            <th onclick="sortTable(7)">ID</th>
          </tr>
        </thead>
        <tbody>
          {rows}
        </tbody>
      </table>
    </div>
  </main>

  <script>
    function sortTable(n) {
      const table = document.getElementById("torrent-table");
      let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
      switching = true;
      dir = "asc";
      
      // Update header styles
      const headers = table.getElementsByTagName("th");
      for (let h = 0; h < headers.length; h++) {
        if (h === n) {
          if (headers[h].classList.contains("sort-asc")) {
            headers[h].classList.replace("sort-asc", "sort-desc");
            dir = "desc";
          } else if (headers[h].classList.contains("sort-desc")) {
            headers[h].classList.replace("sort-desc", "sort-asc");
            dir = "asc";
          } else {
            headers[h].classList.add("sort-asc");
            dir = "asc";
          }
        } else {
          headers[h].classList.remove("sort-asc", "sort-desc");
        }
      }

      while (switching) {
        switching = false;
        rows = table.rows;
        for (i = 1; i < (rows.length - 1); i++) {
          shouldSwitch = false;
          x = rows[i].getElementsByTagName("TD")[n];
          y = rows[i + 1].getElementsByTagName("TD")[n];
          
          let valX = x.getAttribute("data-value") || x.innerText.toLowerCase();
          let valY = y.getAttribute("data-value") || y.innerText.toLowerCase();
          
          // Try to treat as number if possible
          const numX = parseFloat(valX);
          const numY = parseFloat(valY);
          if (!isNaN(numX) && !isNaN(numY)) {
            valX = numX;
            valY = numY;
          }

          if (dir === "asc") {
            if (valX > valY) {
              shouldSwitch = true;
              break;
            }
          } else if (dir === "desc") {
            if (valX < valY) {
              shouldSwitch = true;
              break;
            }
          }
        }
        if (shouldSwitch) {
          rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
          switching = true;
          switchcount++;
        } else {
          if (switchcount === 0 && dir === "asc") {
            dir = "desc";
            switching = true;
          }
        }
      }
    }
  </script>
</body>
</html>
