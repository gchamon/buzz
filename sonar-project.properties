sonar.projectKey=gchamon_buzz
sonar.organization=github-gchamon

sonar.host.url=https://sonarcloud.io

# Python version must match the runtime (see pyproject.toml and .python-version)
sonar.python.version=3.14

# Source and test paths
sonar.sources=buzz
sonar.tests=tests

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated/static assets and templates from analysis
sonar.exclusions=buzz/static/**/*,buzz/pyview_templates/**/*,buzz/egg-info/**/*
